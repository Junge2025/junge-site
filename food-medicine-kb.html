// Nature tag class
function natureClass(nature) {
  if (nature.includes('热') || nature.includes('温')) return 'warm';
  if (nature.includes('寒') || nature.includes('凉')) return 'cold';
  return 'neutral';
}

// Render a substance card
function renderCard(s) {
  const nc = natureClass(s.nature);
  return `<div class="substance-card" data-cat="${s.cat}" data-search="${s.name} ${s.effect} ${s.nature} ${s.taste} ${s.use} ${s.meridian}" onclick="this.classList.toggle('expanded');this.querySelector('.sc-detail').classList.toggle('show')">
    <div class="sc-name">${s.emoji} ${s.name}</div>
    <div class="sc-latin">${s.latin}</div>
    <div class="sc-props">
      <span class="${nc}">${s.nature}</span><span>${s.taste}</span><span>归经: ${s.meridian}</span>
    </div>
    <div class="sc-effect">${s.effect}</div>
    <div class="sc-use">📖 ${s.use}</div>
    ${s.caution !== '—' ? `<div class="sc-caution">⚠ ${s.caution}</div>` : ''}
    <div class="sc-dosage">⚖ 推荐用量: ${s.dosage}</div>
    <div class="sc-detail">
      <dt>拉丁学名</dt><dd>${s.latin}</dd>
      <dt>性味</dt><dd>${s.nature} · ${s.taste}</dd>
      <dt>归经</dt><dd>${s.meridian}</dd>
      <dt>功效</dt><dd>${s.effect}</dd>
      <dt>用法</dt><dd>${s.use}</dd>
      ${s.caution !== '—' ? `<dt>注意</dt><dd style="color:#d47a7e">${s.caution}</dd>` : ''}
      <dt>用量</dt><dd>${s.dosage}</dd>
    </div>
  </div>`;
}

// Render all categories
function renderAll() {
  const cats = [
    {id:'cat-fruit',name:'果实种子类',emoji:'🍎',color:'#d47a7e'},
    {id:'cat-root',name:'根茎叶类',emoji:'🌱',color:'var(--green)'},
    {id:'cat-flower',name:'花类',emoji:'🌸',color:'#d47a7e'},
    {id:'cat-spice',name:'香辛调味类',emoji:'🌶',color:'#e8a040'},
    {id:'cat-other',name:'其他类',emoji:'🍯',color:'var(--gold)'}
  ];
  
  let html = '';
  for (const cat of cats) {
    const items = SUBSTANCES.filter(s => s.cat === cat.id);
    html += `<div class="cat-section" id="${cat.id}">
      <div class="cat-title">
        <span class="icon">${cat.emoji}</span>
        <h2>${cat.name}</h2>
        <span class="count">${items.length}种</span>
      </div>
      <div class="substance-grid">
        ${items.map(renderCard).join('')}
      </div>
    </div>`;
  }
  document.getElementById('mainContent').innerHTML = html;
  updateVisibleCount();
}

function filterSubstances() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) {
    // Show all
    document.querySelectorAll('.substance-card').forEach(c => c.style.display = '');
    document.querySelectorAll('.cat-section').forEach(s => s.style.display = '');
    updateVisibleCount();
    return;
  }
  
  // Search
  let visibleTotal = 0;
  document.querySelectorAll('.cat-section').forEach(section => {
    let sectionVisible = 0;
    section.querySelectorAll('.substance-card').forEach(card => {
      const txt = card.getAttribute('data-search').toLowerCase();
      if (txt.includes(q)) {
        card.style.display = '';
        sectionVisible++;
      } else {
        card.style.display = 'none';
      }
    });
    section.style.display = sectionVisible > 0 ? '' : 'none';
    visibleTotal += sectionVisible;
  });
  
  document.getElementById('visibleCount').innerHTML = `👁 显示 <b>${visibleTotal}</b> 种`;
}

function updateVisibleCount() {
  const total = document.querySelectorAll('.substance-card').length;
  document.getElementById('visibleCount').innerHTML = `👁 显示 <b>${total}</b> 种`;
}

function scrollToCat(catId) {
  document.querySelectorAll('.cat-nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`.cat-nav a[href="#${catId}"]`).classList.add('active');
  document.getElementById(catId).scrollIntoView({behavior:'smooth'});
}

// URL query param support
function handleQuery() {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('searchInput').value = q;
    // Need to wait for render
    setTimeout(filterSubstances, 100);
  }
}

// Init
renderAll();
handleQuery();

// Highlight active nav on scroll
window.addEventListener('scroll', () => {
  const sections = ['cat-fruit','cat-root','cat-flower','cat-spice','cat-other'];
  let current = sections[0];
  for (const id of sections) {
    const el = document.getElementById(id);
    if (el && el.getBoundingClientRect().top < 120) current = id;
  }
  document.querySelectorAll('.cat-nav a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + current);
  });
});
</script>
