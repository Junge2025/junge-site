name: Full Site Quality Check

on:
  push:
    paths: ['**.html', '**.htm', '**.css', '**.js', 'robots.txt', 'sitemap.xml']
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════
  # 1. 死链 + Sitemap + Robots
  # ═══════════════════════════════════════════════
  link-check:
    name: Dead Link + Sitemap + Robots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Lychee
        uses: actions/cache@v4
        with:
          path: ~/.cache/lychee
          key: lychee-cache

      - name: Check sitemap.xml
        run: |
          if [ ! -f sitemap.xml ]; then
            echo "❌ sitemap.xml 不存在"
            exit 1
          fi

      - name: Check robots.txt
        run: |
          if [ ! -f robots.txt ]; then
            echo "❌ robots.txt 不存在"
            exit 1
          fi
          echo "✔ robots.txt 存在"

      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --base https://junge.中国
            --no-progress
            --max-concurrency 10
            --timeout 20
            --retry-wait-time 2
            --max-retries 3
            --accept 200,201,301,302,403,429
            --exclude-mail
            --exclude-file
            --exclude-loopback
            --exclude '^(https?://(localhost|127\.0\.0\.1|::1)|tel:)'
            --exclude-path '**/node_modules/**'
            '**/*.html'
          format: markdown
          output: /tmp/lychee-report.md

      - name: Upload Link Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: /tmp/lychee-report.md

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/lychee-report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔗 死链检查失败',
              body: report.slice(0, 60000),
              labels: ['seo', 'bug']
            });

  # ═══════════════════════════════════════════════
  # 2. HTML 验证 (W3C 风格)
  # ═══════════════════════════════════════════════
  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Run html-validate
        run: |
          html-validate "**/*.html" > /tmp/html-validate-report.txt || exit_code=$?
          echo "Exit code: ${exit_code:-0}"
          exit ${exit_code:-0}

      - name: Upload HTML Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-validation-report
          path: /tmp/html-validate-report.txt

  # ═══════════════════════════════════════════════
  # 3. Lighthouse 性能审计
  # ═══════════════════════════════════════════════
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://junge.中国
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ═══════════════════════════════════════════════
  # 4. 可访问性审计
  # ═══════════════════════════════════════════════
  accessibility:
    name: HTML Accessibility Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pa11y
        run: npm install -g pa11y

      - name: Run Pa11y
        run: pa11y https://junge.中国 --reporter markdown > /tmp/a11y-report.md

      - name: Upload A11y Report
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: /tmp/a11y-report.md

  # ═══════════════════════════════════════════════
  # 5. CSS/JS 压缩检查
  # ═══════════════════════════════════════════════
  assets-check:
    name: CSS/JS Minify Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check unminified CSS/JS
        run: |
          echo "Scanning for large, unminified CSS/JS..."
          find . -name "*.css" ! -name "*.min.css" -size +50k -print > /tmp/unminified-assets.txt || true
          find . -name "*.js"  ! -name "*.min.js"  -size +50k -print >> /tmp/unminified-assets.txt || true

          if [ -s /tmp/unminified-assets.txt ]; then
            echo "❌ Found potentially unminified assets:"
            cat /tmp/unminified-assets.txt
          else
            echo "✔ No large unminified CSS/JS detected."
          fi

      - name: Upload Assets Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assets-minify-report
          path: /tmp/unminified-assets.txt

  # ═══════════════════════════════════════════════
  # 6. 图片死链检查
  # ═══════════════════════════════════════════════
  broken-images:
    name: Broken Image Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for broken images
        run: |
          base="https://junge.中国"
          tmp=/tmp/broken-images.txt
          : > "$tmp"

          grep -Rho '<img[^>]*src="[^"]*"' . \
            | sed -E 's/.*src="([^"]*)".*/\1/' \
            | sort -u \
            | while read -r src; do
              if echo "$src" | grep -qE '^(data:|mailto:|tel:)'; then
                continue
              fi

              if echo "$src" | grep -qE '^(https?://)'; then
                url="$src"
              else
                url="$base/$src"
              fi

              code=$(curl -o /dev/null -s -w "%{http_code}" "$url" || echo "000")
              if ! echo "$code" | grep -qE '^(200|301|302|304)$'; then
                echo "$code $url" >> "$tmp"
              fi
            done

          if [ -s "$tmp" ]; then
            echo "❌ Broken images found:"
            cat "$tmp"
            exit 1
          else
            echo "✔ No broken images detected."
          fi

      - name: Upload Broken Image Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broken-images-report
          path: /tmp/broken-images.txt

  # ═══════════════════════════════════════════════
  # 7. Sitemap 自动生成
  # ═══════════════════════════════════════════════
  sitemap-generate:
    name: Generate sitemap.xml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap.xml
        run: |
          base="https://junge.中国"
          out="sitemap.xml"

          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$out"
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> "$out"

          find . -name "*.html" | sed 's|^\./||' | while read -r path; do
            url="$base/${path}"
            echo "  <url><loc>${url}</loc></url>" >> "$out"
          done

          echo '</urlset>' >> "$out"

      - name: Upload sitemap.xml
        uses: actions/upload-artifact@v4
        with:
          name: sitemap-generated
          path: sitemap.xml

      - name: Create PR for sitemap update
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "🤖 自动更新 sitemap.xml"
          title: "🤖 自动更新 sitemap.xml"
          body: "本 PR 由全站质量巡检自动生成，更新了 sitemap.xml。请审核合并。"
          labels: seo, automated

  # ═══════════════════════════════════════════════
  # 8. 自动修复死链 (扩展规则)
  # ═══════════════════════════════════════════════
  auto-fix:
    name: Auto Fix Dead Links (PR)
    needs: link-check
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auto Fix Common Dead Links
        run: |
          # http → https
          find . -name "*.html" -type f -exec sed -i 's/http:\/\//https:\/\//g' {} \;

          # /index.html → /
          find . -name "*.html" -type f -exec sed -i 's/\/index\.html"/"/g' {} \;

          # 修复重复斜杠 // → /
          find . -name "*.html" -type f -exec sed -i 's/https:\/\/\//https:\/\//g' {} \;

          # 修复旧 CDN 链接（按需修改域名）
          # find . -name "*.html" -type f -exec sed -i 's/cdn.old.com/cdn.new.com/g' {} \;

          # 修复旧域名
          # find . -name "*.html" -type f -exec sed -i 's/old-domain.com/junge.中国/g' {} \;

          # 修复 ./path → /path
          find . -name "*.html" -type f -exec sed -i 's/\.\/\([a-zA-Z0-9]\)/\1/g' {} \;

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "🔧 自动修复死链与链接格式"
          title: "🔧 自动修复死链与链接规范"
          body: "本 PR 自动修复了部分死链（http→https、/index.html 等）。请审核。"
          labels: seo

  # ═══════════════════════════════════════════════
  # 9. HTML Lint (HTMLHint)
  # ═══════════════════════════════════════════════
  html-lint:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint "**/*.html" > /tmp/htmlhint-report.txt || true

      - name: Upload HTMLHint Report
        uses: actions/upload-artifact@v4
        with:
          name: htmlhint-report
          path: /tmp/htmlhint-report.txt

  # ═══════════════════════════════════════════════
  # 10. CSS Lint (stylelint)
  # ═══════════════════════════════════════════════
  css-lint:
    name: CSS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Run stylelint
        run: stylelint "**/*.css" > /tmp/stylelint-report.txt || true

      - name: Upload CSS Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: css-lint-report
          path: /tmp/stylelint-report.txt

  # ═══════════════════════════════════════════════
  # 11. JS Lint (ESLint)
  # ═══════════════════════════════════════════════
  js-lint:
    name: JS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ESLint
        run: npm install -g eslint

      - name: Run ESLint
        run: eslint "**/*.js" -f html -o /tmp/eslint-report.html || true

      - name: Upload ESLint Report
        uses: actions/upload-artifact@v4
        with:
          name: js-lint-report
          path: /tmp/eslint-report.html

  # ═══════════════════════════════════════════════
  # 12. 图片压缩检查
  # ═══════════════════════════════════════════════
  image-optimization:
    name: Image Optimization Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for large images
        run: |
          echo "Scanning for large images..."
          find . -name "*.png" -size +300k -print > /tmp/large-images.txt || true
          find . -name "*.jpg" -size +300k -print >> /tmp/large-images.txt || true
          find . -name "*.jpeg" -size +300k -print >> /tmp/large-images.txt || true

          if [ -s /tmp/large-images.txt ]; then
            echo "❌ Found large images:"
            cat /tmp/large-images.txt
            exit 1
          else
            echo "✔ No large images detected."
          fi

      - name: Upload Image Optimization Report
        uses: actions/upload-artifact@v4
        with:
          name: image-optimization-report
          path: /tmp/large-images.txt


  # ═══════════════════════════════════════════════
  # 13. WebP 自动生成
  # ═══════════════════════════════════════════════
  webp-generate:
    name: "⑬ webp-generate (WebP 自动生成)"
    runs-on: ubuntu-latest
    needs: [image-optimization]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cwebp
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Generate WebP images
        run: |
          find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) \
            -not -path "./.git/*" -not -path "./node_modules/*" -print0 | \
            xargs -0 -I{} bash -c '
              file="{}"
              base=$(basename "$file")
              name="${base%.*}"
              dir=$(dirname "$file")
              webp_file="${dir}/${name}.webp"
              if [ ! -f "$webp_file" ]; then
                cwebp -q 80 "$file" -o "$webp_file"
                echo "Generated: $webp_file"
              fi
            '

      - name: Create WebP PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: generate WebP images"
          branch: chore/webp-auto-generate
          title: "chore: WebP 自动生成"
          body: |
            - 自动扫描 jpg/png
            - 生成对应 WebP
          labels: webp, automation

  # ═══════════════════════════════════════════════
  # 14. HTML/CSS/JS 自动修复
  # ═══════════════════════════════════════════════
  code-auto-fix:
    name: "⑭ code-auto-fix (HTML/CSS/JS 自动修复)"
    runs-on: ubuntu-latest
    needs: [html-lint, css-lint, js-lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run auto fixers
        run: |
          npm run fix:html
          npm run fix:css
          npm run fix:js

      - name: Create auto-fix PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto fix HTML/CSS/JS"
          branch: chore/code-auto-fix
          title: "chore: HTML/CSS/JS 自动修复"
          body: |
            - Prettier/ESLint/stylelint/htmlhint 自动修复
            - 与 ⑧ auto-fix 规则互补（URL/路径/域名层面）
          labels: auto-fix, formatting

  # ═══════════════════════════════════════════════
  # 15. 手动一键推送 (仅 workflow_dispatch)
  # ═══════════════════════════════════════════════
  manual-auto-push:
    name: "manual-auto-push (手动一键推送)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push current branch
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: manual auto push"
            git push
          else
            echo "No changes to push."
          fi