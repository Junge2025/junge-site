name: Full Site Quality Check

on:
  push:
    paths: ['**.html', '**.htm', '**.css', '**.js', 'robots.txt', 'sitemap.xml']
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════
  # ① 死链 + Sitemap + Robots
  # ═══════════════════════════════════════════════
  link-check:
    name: "① Dead Link + Sitemap + Robots"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Lychee
        uses: actions/cache@v4
        with:
          path: ~/.cache/lychee
          key: lychee-cache

      - name: Check sitemap.xml
        run: |
          if [ ! -f sitemap.xml ]; then
            echo "❌ sitemap.xml 不存在"
            exit 1
          fi

      - name: Check robots.txt
        run: |
          if [ ! -f robots.txt ]; then
            echo "❌ robots.txt 不存在"
            exit 1
          fi
          echo "✔ robots.txt 存在"

      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --base https://junge.中国
            --no-progress
            --max-concurrency 10
            --timeout 20
            --retry-wait-time 2
            --max-retries 3
            --accept 200,201,301,302,403,429
            --exclude-mail
            --exclude-file
            --exclude-loopback
            --exclude '^(https?://(localhost|127\.0\.0\.1|::1)|tel:)'
            --exclude-path '**/node_modules/**'
            '**/*.html'
          format: markdown
          output: /tmp/lychee-report.md

      - name: Upload Link Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: /tmp/lychee-report.md

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/lychee-report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔗 死链检查失败',
              body: report.slice(0, 60000),
              labels: ['seo', 'bug']
            });

  # ═══════════════════════════════════════════════
  # ② HTML 验证 (W3C 风格)
  # ═══════════════════════════════════════════════
  html-validate:
    name: "② HTML Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Run html-validate
        run: |
          html-validate "**/*.html" > /tmp/html-validate-report.txt || exit_code=$?
          echo "Exit code: ${exit_code:-0}"
          exit ${exit_code:-0}

      - name: Upload HTML Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-validation-report
          path: /tmp/html-validate-report.txt

  # ═══════════════════════════════════════════════
  # ③ Lighthouse 性能审计
  # ═══════════════════════════════════════════════
  lighthouse:
    name: "③ Lighthouse Performance Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://junge.中国
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ═══════════════════════════════════════════════
  # ④ 可访问性审计
  # ═══════════════════════════════════════════════
  accessibility:
    name: "④ HTML Accessibility Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pa11y
        run: npm install -g pa11y

      - name: Run Pa11y
        run: pa11y https://junge.中国 --reporter markdown > /tmp/a11y-report.md

      - name: Upload A11y Report
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: /tmp/a11y-report.md

  # ═══════════════════════════════════════════════
  # ⑤ CSS/JS 压缩检查
  # ═══════════════════════════════════════════════
  assets-check:
    name: "⑤ CSS/JS Minify Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check unminified CSS/JS
        run: |
          echo "Scanning for large, unminified CSS/JS..."
          find . -name "*.css" ! -name "*.min.css" -size +50k -print > /tmp/unminified-assets.txt || true
          find . -name "*.js"  ! -name "*.min.js"  -size +50k -print >> /tmp/unminified-assets.txt || true

          if [ -s /tmp/unminified-assets.txt ]; then
            echo "❌ Found potentially unminified assets:"
            cat /tmp/unminified-assets.txt
          else
            echo "✔ No large unminified CSS/JS detected."
          fi

      - name: Upload Assets Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assets-minify-report
          path: /tmp/unminified-assets.txt

  # ═══════════════════════════════════════════════
  # ⑥ 图片死链检查
  # ═══════════════════════════════════════════════
  broken-images:
    name: "⑥ Broken Image Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for broken images
        run: |
          base="https://junge.中国"
          tmp=/tmp/broken-images.txt
          : > "$tmp"

          grep -Rho '<img[^>]*src="[^"]*"' . \
            | sed -E 's/.*src="([^"]*)".*/\1/' \
            | sort -u \
            | while read -r src; do
              if echo "$src" | grep -qE '^(data:|mailto:|tel:)'; then
                continue
              fi

              if echo "$src" | grep -qE '^(https?://)'; then
                url="$src"
              else
                url="$base/$src"
              fi

              code=$(curl -o /dev/null -s -w "%{http_code}" "$url" || echo "000")
              if ! echo "$code" | grep -qE '^(200|301|302|304)$'; then
                echo "$code $url" >> "$tmp"
              fi
            done

          if [ -s "$tmp" ]; then
            echo "❌ Broken images found:"
            cat "$tmp"
            exit 1
          else
            echo "✔ No broken images detected."
          fi

      - name: Upload Broken Image Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broken-images-report
          path: /tmp/broken-images.txt

  # ═══════════════════════════════════════════════
  # ⑦ Sitemap 自动生成
  # ═══════════════════════════════════════════════
  sitemap-generate:
    name: "⑦ Generate sitemap.xml"
    needs: link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate sitemap.xml
        run: |
          base="https://junge.中国"
          out="sitemap.xml"

          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$out"
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> "$out"

          find . -name "*.html" | sed 's|^\./||' | while read -r path; do
            url="$base/${path}"
            # 从 git 获取最后修改日期
            lastmod=$(git log -1 --format="%cs" -- "$path" 2>/dev/null || date +%Y-%m-%d)
            echo "  <url><loc>${url}</loc><lastmod>${lastmod}</lastmod></url>" >> "$out"
          done

          echo '</urlset>' >> "$out"
          echo "Generated sitemap.xml with $(grep -c '<loc>' "$out") URLs"

      - name: Upload sitemap.xml
        uses: actions/upload-artifact@v4
        with:
          name: sitemap-generated
          path: sitemap.xml

      - name: Create PR for sitemap update
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "🤖 自动更新 sitemap.xml"
          title: "🤖 自动更新 sitemap.xml"
          body: "本 PR 由全站质量巡检自动生成，更新了 sitemap.xml。请审核合并。"
          labels: seo, automated

  # ═══════════════════════════════════════════════
  # ⑧ auto-fix-super (URL修复 + HTML/CSS/JS修复)
  # ═══════════════════════════════════════════════
  auto-fix-super:
    name: "⑧ auto-fix-super (URL 修复 + HTML/CSS/JS 修复)"
    runs-on: ubuntu-latest
    needs: [link-check, html-lint, css-lint, js-lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run URL/path/domain auto-fix
        run: bash scripts/auto-fix.sh

      - name: Run code formatters
        run: |
          npm run fix:html
          npm run fix:css
          npm run fix:js

      - name: Create auto-fix PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-fix-super (URL + HTML/CSS/JS)"
          branch: chore/auto-fix-super
          title: "chore: auto-fix-super"
          body: |
            - URL/路径/域名修复
            - HTML/CSS/JS 自动修复
            - 自动格式化 + 自动规范化
          labels: auto-fix, automation
          delete-branch: true
          base: main
          signoff: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --rebase "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════
  # ⑨ HTML Lint (HTMLHint)
  # ═══════════════════════════════════════════════
  html-lint:
    name: "⑨ HTML Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint "**/*.html" > /tmp/htmlhint-report.txt || true

      - name: Upload HTMLHint Report
        uses: actions/upload-artifact@v4
        with:
          name: htmlhint-report
          path: /tmp/htmlhint-report.txt

  # ═══════════════════════════════════════════════
  # ⑩ CSS Lint (stylelint)
  # ═══════════════════════════════════════════════
  css-lint:
    name: "⑩ CSS Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Run stylelint
        run: stylelint "**/*.css" > /tmp/stylelint-report.txt || true

      - name: Upload CSS Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: css-lint-report
          path: /tmp/stylelint-report.txt

  # ═══════════════════════════════════════════════
  # ⑪ JS Lint (ESLint)
  # ═══════════════════════════════════════════════
  js-lint:
    name: "⑪ JS Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ESLint
        run: npm install -g eslint

      - name: Run ESLint
        run: eslint "**/*.js" -f html -o /tmp/eslint-report.html || true

      - name: Upload ESLint Report
        uses: actions/upload-artifact@v4
        with:
          name: js-lint-report
          path: /tmp/eslint-report.html

  # ═══════════════════════════════════════════════
  # ⑫ image-optimize-super (大图检测 + WebP 自动生成)
  # ═══════════════════════════════════════════════
  image-optimize-super:
    name: "⑫ image-optimize-super (大图检测 + WebP 自动生成)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Detect large images (>300KB)
        run: |
          mkdir -p optimize-report
          find . -type f \( -iname "*.jpg" -o -iname "*.png" \) \
            -not -path "./.git/*" -not -path "./node_modules/*" \
            -size +300k > optimize-report/large-images.txt || true

      - name: Generate WebP images
        run: |
          find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) \
            -not -path "./.git/*" -not -path "./node_modules/*" -print0 | \
            xargs -0 -I{} bash -c '
              file="{}"
              base=$(basename "$file")
              name="${base%.*}"
              dir=$(dirname "$file")
              webp_file="${dir}/${name}.webp"
              if [ ! -f "$webp_file" ]; then
                cwebp -q 80 "$file" -o "$webp_file"
                echo "Generated: $webp_file"
              fi
            '

      - name: Generate AVIF images
        run: |
          sudo apt-get install -y libavif-bin
          find . -type f \\( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \\) \\
            -not -path "./.git/*" -not -path "./node_modules/*" -print0 | \\
            xargs -0 -I{} bash -c '
              file="{}"
              base=$(basename "$file")
              name="${base%.*}"
              dir=$(dirname "$file")
              avif_file="${dir}/${name}.avif"
              if [ ! -f "$avif_file" ]; then
                avifenc --min 20 --max 30 "$file" "$avif_file"
                echo "Generated AVIF: $avif_file"
              fi
            '

      - name: Create image-optimize PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: image-optimize-super (大图检测 + WebP)"
          branch: chore/image-optimize-super
          title: "chore: image-optimize-super"
          body: |
            - 大图检测（>300KB）
            - 自动生成 WebP（jpg/png → webp）
            - 自动生成 AVIF（jpg/png → avif）
          labels: image, automation
          delete-branch: true
          base: main
          signoff: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --rebase "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════
  # ⑬ 质量报告 Dashboard
  # ═══════════════════════════════════════════════
  quality-dashboard:
    name: "⑬ 质量报告 Dashboard"
    runs-on: ubuntu-latest
    needs: [auto-fix-super, image-optimize-super]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate lint reports
        run: |
          npm run fix:html:report
          npm run fix:css:report
          npm run fix:js:report
          mkdir -p optimize-report

      - name: Build Dashboard
        run: |
          mkdir -p dashboard
          cat > dashboard/index.html << 'DASHBOARD_EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
          <meta charset="UTF-8">
          <title>军鸽云链 Daily Quality Report</title>
          <style>
            body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #0d1117; color: #c9d1d9; }
            h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
            h2 { color: #f0883e; margin-top: 30px; }
            pre { background: #161b22; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
            .pass { color: #3fb950; }
            .fail { color: #f85149; }
            .meta { color: #8b949e; font-size: 12px; margin-top: 40px; }
          </style>
          </head>
          <body>
          <h1>📊 军鸽云链 Daily Quality Report</h1>
          <p class="meta">Generated: REPLACE_DATE</p>

          <h2>HTML Lint</h2>
          <pre>REPLACE_HTML_LINT</pre>

          <h2>CSS Lint</h2>
          <pre>REPLACE_CSS_LINT</pre>

          <h2>JS Lint</h2>
          <pre>REPLACE_JS_LINT</pre>

          <h2>Large Images (>300KB)</h2>
          <pre>REPLACE_LARGE_IMAGES</pre>

          <p class="meta">军鸽云链数智 · junge.中国 · 全自动质量巡检</p>
          </body>
          </html>
          DASHBOARD_EOF

          # Inject reports
          DATE=$(date +%Y-%m-%d)
          sed -i "s/REPLACE_DATE/$DATE/" dashboard/index.html

          for report in html-lint css-lint js-lint; do
            if [ -f "reports/$report.txt" ]; then
              content=$(cat "reports/$report.txt" | head -100)
              sed -i "s|REPLACE_${report^^}_LINT|${content//$'\\n'/\\\\n}|" dashboard/index.html
            else
              sed -i "s/REPLACE_${report^^}_LINT/(no data)/" dashboard/index.html
            fi
          done

          if [ -f "optimize-report/large-images.txt" ]; then
            content=$(cat "optimize-report/large-images.txt" | head -50)
            sed -i "s/REPLACE_LARGE_IMAGES/${content//$'\\n'/\\\\n}/" dashboard/index.html
          else
            sed -i "s/REPLACE_LARGE_IMAGES/✔ No large images detected/" dashboard/index.html
          fi

      - name: Upload Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: quality-dashboard
          path: dashboard/index.html

  # ═══════════════════════════════════════════════
  # ⑭ 手动一键推送 (仅 workflow_dispatch)
  # ═══════════════════════════════════════════════
  manual-auto-push:
    name: "⑭ manual-auto-push (手动一键推送)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push current branch
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: manual auto push"
            git push
          else
            echo "No changes to push."
          fi
