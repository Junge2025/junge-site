name: SEO Link Check

on:
  push:
    paths: ['**.html', '**.htm']
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:

jobs:
  dead-links:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. 缓存 Lychee（显著加速）
      - name: Cache Lychee
        uses: actions/cache@v4
        with:
          path: ~/.cache/lychee
          key: lychee-cache

      # 2. 运行 Lychee
      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --base https://junge.中国
            --no-progress
            --max-concurrency 10
            --timeout 20
            --retry-wait-time 2
            --max-retries 3
            --accept 200,201,301,302,403,429
            --exclude-mail
            --exclude-loopback
            --exclude-file
            --exclude '^(https?://(localhost|127\.0\.0\.1|::1)|tel:)'
            --exclude-path '**/node_modules/**'
            '**/*.html'
          format: markdown
          output: /tmp/lychee-report.md

      # 3. 上传报告
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: /tmp/lychee-report.md

      # 4. 失败时自动创建 Issue
      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/lychee-report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔗 链接检查发现死链',
              body: report.slice(0, 60000),
              labels: ['seo', 'bug']
            });
